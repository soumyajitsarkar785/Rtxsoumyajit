apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: delivery-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: delivery-order:latest
        ports:
        - containerPort: 3012
        env:
        - name: PORT
          value: "3012"
        - name: POSTGRES_HOST
          value: postgres-service
        - name: KAFKA_BROKER
          value: kafka-service:9092
        resources:
          requests: { memory: "256Mi", cpu: "200m" }
          limits:   { memory: "512Mi", cpu: "500m" }
