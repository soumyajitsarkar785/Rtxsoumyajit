apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: delivery-ingress
  namespace: delivery-app
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
  - hosts: [api.yourdeliveryapp.com]
    secretName: delivery-tls
  rules:
  - host: api.yourdeliveryapp.com
    http:
      paths:
      - path: /api/v1/auth
        pathType: Prefix
        backend:
          service: { name: auth-service, port: { number: 3010 } }
      - path: /api/v1/orders
        pathType: Prefix
        backend:
          service: { name: order-service, port: { number: 3012 } }
      - path: /tracking
        pathType: Prefix
        backend:
          service: { name: tracking-service, port: { number: 3013 } }
