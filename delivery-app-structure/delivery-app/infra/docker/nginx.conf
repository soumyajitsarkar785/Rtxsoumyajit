events { worker_connections 1024; }

http {
  upstream auth      { server auth-service:3010; }
  upstream users     { server user-service:3011; }
  upstream orders    { server order-service:3012; }
  upstream tracking  { server tracking-service:3013; }
  upstream payments  { server payment-service:3014; }
  upstream notify    { server notification-service:3015; }
  upstream admin     { server admin-service:3016; }

  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

  server {
    listen 80;

    location /api/v1/auth      { limit_req zone=api burst=20; proxy_pass http://auth;     }
    location /api/v1/users     { proxy_pass http://users;    }
    location /api/v1/orders    { proxy_pass http://orders;   }
    location /api/v1/tracking  { proxy_pass http://tracking; }
    location /api/v1/payments  { proxy_pass http://payments; }
    location /api/v1/admin     { proxy_pass http://admin;    }

    # WebSocket passthrough
    location /tracking {
      proxy_pass http://tracking;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
